<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tournaments | Inertia</title>
  <meta name="description" content="Browse live and completed Beyblade X tournaments powered by Inertia. Real-time brackets, standings, and match data.">

  <!-- Open Graph -->
  <meta property="og:title" content="Tournaments | Inertia">
  <meta property="og:description" content="Live and completed Beyblade X tournament brackets, standings, and match data.">
  <meta property="og:type" content="website">

  <!-- Fonts & Stylesheets -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/design-tokens.css" rel="stylesheet">
  <link href="css/utilities.css" rel="stylesheet">
  <link href="css/mvp.css" rel="stylesheet">
  <link href="css/animations.css" rel="stylesheet">
  <link href="css/tournament.css" rel="stylesheet">

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/intersect@3.x.x/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Shared tournament module -->
  <script src="js/tournament-shared.js"></script>
</head>
<body class="tournament-page">
  <div class="min-h-screen" x-data="tournamentList()" x-init="init()">

    <!-- NAVIGATION -->
    <nav class="fixed top-0 w-full z-50 transition-all duration-300" style="background-color: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px);">
      <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-center h-16">
          <a href="/" class="flex items-center">
            <span class="text-2xl font-thin tracking-widest text-frost">INERTIA</span>
          </a>
          <div class="hidden md:flex items-center space-x-8">
            <div class="relative" x-data="{ open: false }" @mouseenter="open = true" @mouseleave="open = false">
              <button class="text-gray-200 text-opacity-70 hover:text-cyan transition-colors duration-300 text-sm tracking-wider uppercase flex items-center gap-1" style="background: transparent !important; border: none !important; padding: 0; cursor: pointer;">
                Products
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
              </button>
              <div x-show="open" x-transition class="absolute left-0 mt-2 w-48 rounded-lg bg-steel border border-cyan-500 border-opacity-20 shadow-lg overflow-hidden" style="display: none;">
                <a href="/products/app.html" class="block px-4 py-3 text-sm text-gray-200 hover:bg-cyan-500 hover:bg-opacity-10 hover:text-cyan transition-colors">Inertia App</a>
                <a href="/docs/" class="block px-4 py-3 text-sm text-gray-200 hover:bg-cyan-500 hover:bg-opacity-10 hover:text-cyan transition-colors">Documentation</a>
                <a href="/releases.html" class="block px-4 py-3 text-sm text-gray-200 hover:bg-cyan-500 hover:bg-opacity-10 hover:text-cyan transition-colors">Release Notes</a>
                <a href="/products/insight.html" class="block px-4 py-3 text-sm text-gray-200 hover:bg-cyan-500 hover:bg-opacity-10 hover:text-cyan transition-colors">Insight</a>
                <a href="/products/axis.html" class="block px-4 py-3 text-sm text-gray-200 hover:bg-cyan-500 hover:bg-opacity-10 hover:text-cyan transition-colors">Axis</a>
              </div>
            </div>
            <a href="/platform.html" class="text-gray-200 text-opacity-70 hover:text-cyan transition-colors duration-300 text-sm tracking-wider uppercase" style="text-decoration: none;">Platform</a>
            <a href="/tournaments.html" class="text-cyan text-sm tracking-wider uppercase" style="text-decoration: none;">Tournaments</a>
            <a href="/leaderboard.html" class="text-gray-200 text-opacity-70 hover:text-cyan transition-colors duration-300 text-sm tracking-wider uppercase" style="text-decoration: none;">Leaderboard</a>
          </div>
        </div>
      </div>
    </nav>

    <!-- HERO -->
    <section class="relative pt-32 pb-8" x-data="{ loaded: false }" x-init="setTimeout(() => loaded = true, 200)">
      <div class="max-w-4xl mx-auto px-6 text-center">
        <h1 class="text-5xl sm:text-6xl md:text-7xl font-thin tracking-widest mb-4" x-show="loaded" x-transition>
          TOURNAMENTS
        </h1>
        <p class="text-lg text-gray-300 text-opacity-70 max-w-xl mx-auto" x-show="loaded" x-transition>
          Live brackets, standings, and match data from Beyblade X events.
        </p>
      </div>
    </section>

    <!-- FILTERS + SEARCH -->
    <section class="pb-6">
      <div class="max-w-5xl mx-auto px-6">
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
          <!-- Filter tabs -->
          <div class="filter-tabs">
            <button class="filter-tab" :class="{ active: activeFilter === 'all' }" @click="activeFilter = 'all'">All</button>
            <button class="filter-tab" :class="{ active: activeFilter === 'live' }" @click="activeFilter = 'live'">Live</button>
            <button class="filter-tab" :class="{ active: activeFilter === 'completed' }" @click="activeFilter = 'completed'">Completed</button>
          </div>
          <!-- Search -->
          <div class="relative">
            <svg class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4" style="color: rgba(255,255,255,0.3);" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            <input type="text" class="search-input" placeholder="Search tournaments..." x-model="searchQuery">
          </div>
        </div>
      </div>
    </section>

    <!-- TOURNAMENT GRID -->
    <section class="pb-16">
      <div class="max-w-5xl mx-auto px-6">

        <!-- Loading State -->
        <template x-if="loading">
          <div class="tournament-grid">
            <template x-for="i in 6" :key="i">
              <div class="tournament-discovery-card" style="pointer-events: none;">
                <div class="card-header">
                  <div class="skeleton" style="width: 60%; height: 20px;"></div>
                  <div class="skeleton" style="width: 50px; height: 20px; border-radius: 100px;"></div>
                </div>
                <div style="display: flex; gap: 0.75rem; margin-top: 0.5rem;">
                  <div class="skeleton" style="width: 70px; height: 14px;"></div>
                  <div class="skeleton" style="width: 90px; height: 14px;"></div>
                  <div class="skeleton" style="width: 60px; height: 14px;"></div>
                </div>
              </div>
            </template>
          </div>
        </template>

        <!-- Error State -->
        <template x-if="error && !loading">
          <div class="error-state">
            <div class="error-icon">!</div>
            <p class="error-message" x-text="error"></p>
            <button class="retry-btn" @click="fetchTournaments()">Try Again</button>
          </div>
        </template>

        <!-- Empty State -->
        <template x-if="!loading && !error && filteredTournaments.length === 0">
          <div class="empty-state">
            <div class="empty-icon">&#9670;</div>
            <template x-if="searchQuery || activeFilter !== 'all'">
              <div>
                <p>No matching tournaments found.</p>
                <p style="font-size: 0.8rem;">Try adjusting your filters.</p>
              </div>
            </template>
            <template x-if="!searchQuery && activeFilter === 'all'">
              <div>
                <p>No tournaments yet.</p>
                <p style="font-size: 0.8rem;">Start one in the Inertia App!</p>
              </div>
            </template>
          </div>
        </template>

        <!-- Tournament Cards -->
        <template x-if="!loading && !error && filteredTournaments.length > 0">
          <div class="tournament-grid">
            <template x-for="t in filteredTournaments" :key="t.id">
              <a :href="'/tournament.html?id=' + t.id" class="tournament-discovery-card">
                <div class="card-header">
                  <span class="card-name" x-text="t.name"></span>
                  <span class="status-badge" :class="isLive(t) ? 'live' : 'completed'"
                        x-text="isLive(t) ? 'Live' : 'Completed'"></span>
                </div>
                <div class="card-meta">
                  <span class="card-meta-item" x-text="formatLabel(t.format)"></span>
                  <span class="card-meta-item" x-show="isLive(t)">
                    <span x-text="formatStageName(t.stage)"></span>
                    <span class="meta-separator">&middot;</span>
                    Round <span x-text="t.current_round"></span>
                  </span>
                  <span class="card-meta-item" x-show="t._playerCount !== undefined">
                    <span x-text="t._playerCount"></span> players
                  </span>
                  <span class="card-meta-item" x-text="formatDate(t.started_at)"></span>
                </div>
              </a>
            </template>
          </div>
        </template>

      </div>
    </section>

    <!-- FOOTER -->
    <footer class="relative py-12 border-t border-gray-800 border-opacity-30">
      <div class="max-w-7xl mx-auto px-6">
        <div class="flex flex-col md:flex-row justify-between items-center text-center md:text-left">
          <div class="mb-4 md:mb-0">
            <h3 class="text-2xl font-thin tracking-widest mb-2">INERTIA</h3>
            <p class="text-sm" style="color: rgba(245,245,245,0.4);">Data-Driven Beyblade Performance</p>
          </div>
          <div class="flex space-x-8">
            <a href="/privacy.html" class="text-sm hover:text-cyan transition-colors" style="color: rgba(245,245,245,0.4); text-decoration: none;">Privacy</a>
            <a href="mailto:contact@inertia.cx" class="text-sm hover:text-cyan transition-colors" style="color: rgba(245,245,245,0.4); text-decoration: none;">Contact</a>
          </div>
        </div>
      </div>
    </footer>

  </div>

  <script>
    function tournamentList() {
      return {
        tournaments: [],
        loading: true,
        error: null,
        activeFilter: 'all',
        searchQuery: '',

        async init() {
          await this.fetchTournaments();
        },

        async fetchTournaments() {
          this.loading = true;
          this.error = null;

          try {
            if (!supabaseClient) throw new Error('Supabase client not initialized');

            // Fetch started, non-deleted tournaments
            const { data: tournaments, error: tError } = await supabaseClient
              .from('tournaments')
              .select('id, name, format, stage, current_round, started_at, finished_at, cancelled_at, table_count, point_goal, livestream_url')
              .not('started_at', 'is', null)
              .is('deleted_at', null)
              .order('started_at', { ascending: false })
              .limit(50);

            if (tError) throw tError;

            // Filter out cancelled tournaments
            const activeTournaments = (tournaments || []).filter(t => !t.cancelled_at);

            // Fetch participant counts
            if (activeTournaments.length > 0) {
              const ids = activeTournaments.map(t => t.id);
              const { data: participants, error: pError } = await supabaseClient
                .from('tournament_participants')
                .select('tournament_id')
                .in('tournament_id', ids)
                .eq('is_participating', true);

              if (!pError && participants) {
                // Count per tournament
                const counts = {};
                for (const p of participants) {
                  counts[p.tournament_id] = (counts[p.tournament_id] || 0) + 1;
                }
                for (const t of activeTournaments) {
                  t._playerCount = counts[t.id] || 0;
                }
              }
            }

            this.tournaments = activeTournaments;
          } catch (err) {
            console.error('Tournament list fetch error:', err);
            this.error = err.message || 'Failed to load tournaments';

            // Fall back to demo data when anon key not configured
            if (SUPABASE_ANON_KEY === 'YOUR_SUPABASE_ANON_KEY_HERE') {
              this.useDemoData();
            }
          } finally {
            this.loading = false;
          }
        },

        useDemoData() {
          this.error = null;
          this.tournaments = [
            { id: 'demo-1', name: 'Bay Area Clash #12', format: 'swiss', stage: 'swiss_rounds', current_round: 3, started_at: new Date().toISOString(), finished_at: null, cancelled_at: null, table_count: 4, point_goal: 5, _playerCount: 16 },
            { id: 'demo-2', name: 'West Coast Bladers Weekly', format: 'swiss', stage: 'finals', current_round: 5, started_at: new Date(Date.now() - 86400000).toISOString(), finished_at: new Date(Date.now() - 43200000).toISOString(), cancelled_at: null, table_count: 4, point_goal: 5, _playerCount: 24 },
            { id: 'demo-3', name: 'NYC Beyblade Championship', format: 'single_elimination', stage: 'single_elimination', current_round: 4, started_at: new Date(Date.now() - 172800000).toISOString(), finished_at: new Date(Date.now() - 86400000).toISOString(), cancelled_at: null, table_count: 2, point_goal: 3, _playerCount: 32 },
          ];
        },

        isLive(t) {
          return t.started_at && !t.finished_at && !t.cancelled_at;
        },

        get filteredTournaments() {
          let list = this.tournaments;

          // Apply status filter
          if (this.activeFilter === 'live') {
            list = list.filter(t => this.isLive(t));
          } else if (this.activeFilter === 'completed') {
            list = list.filter(t => t.finished_at);
          }

          // Apply search filter
          if (this.searchQuery) {
            const q = this.searchQuery.toLowerCase();
            list = list.filter(t => t.name.toLowerCase().includes(q));
          }

          // Sort: live first (by started_at desc), then completed (by finished_at desc)
          return list.sort((a, b) => {
            const aLive = this.isLive(a);
            const bLive = this.isLive(b);
            if (aLive && !bLive) return -1;
            if (!aLive && bLive) return 1;
            // Both same status — most recent first
            const aDate = new Date(a.finished_at || a.started_at);
            const bDate = new Date(b.finished_at || b.started_at);
            return bDate - aDate;
          });
        }
      };
    }
  </script>
</body>
</html>
